name: brief-status-check

# BU-brief-status-mechanism. Two gates:
#
#   1. Trackers freshness — `npm run trackers:check` must pass. The
#      AUTOGEN regions in docs/build/bu-sequence.md must reflect
#      current front-matter on every brief.
#
#   2. Ship-flip enforcement — if the PR title or any commit message
#      on the branch contains a literal `BU-<slug>` reference, the
#      matching brief must have status flipped to `shipped` in this
#      PR's diff. Mirrors the version-bump gate. The PR body is
#      deliberately not consulted (B15 follow-up: free-text body
#      mentions caused false positives in PR #118 / #119).
#
# Why both: trackers:check catches any front-matter change that wasn't
# regenerated; the ship-flip script catches BU PRs that forgot to flip
# their own brief. Either failure blocks merge.

on:
  pull_request:
    branches: [main]

jobs:
  brief-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Trackers freshness (npm run trackers:check)
        run: npm run trackers:check

      - name: Brief ship-flip enforcement
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npx tsx scripts/check-brief-flip.ts
