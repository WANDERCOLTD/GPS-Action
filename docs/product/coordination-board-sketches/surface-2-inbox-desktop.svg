<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="-apple-system, BlinkMacSystemFont, Inter, 'Helvetica Neue', Arial, sans-serif">
  <title>Direction B · Inbox desktop · GPS Action coordination board</title>
  <desc>Surface 2 of 5 · SleekFlow-style 4-pane: global rail · sidebar of lenses + teams · conversation list · conversation detail with Reply/Note tabs. Pre-prototype mockup, GPS palette.</desc>
  <style>
    .canvas{fill:#f4f1ea}.raised{fill:#fff;stroke:#e5e2d8;stroke-width:1}
    .sunken{fill:#ede9df}.border{stroke:#e5e2d8;stroke-width:1;fill:none}
    .rail{fill:#1a1d29}.rail-icon{fill:#6c7081}.rail-active{fill:#3d74e6}
    .urgent{fill:#d85a30}.urgent-bg{fill:#faece7}
    .info{fill:#3c3489}.info-bg{fill:#eeedfe}
    .success{fill:#0f6e56}.success-bg{fill:#e1f5ee}
    .warning{fill:#ba7517}.warning-bg{fill:#faeeda}
    .primary{fill:#1851cc}.primary-bg{fill:#e6edfa}
    .text{fill:#2c2c2a}.text-2{fill:#5f5e5a}.text-3{fill:#888780}
    .ttl{font-size:30px;font-weight:700;fill:#2c2c2a;letter-spacing:-0.5px}
    .sub{font-size:15px;fill:#5f5e5a}
    .h4{font-size:10px;font-weight:600;fill:#888780;letter-spacing:1px}
    .lab{font-size:12px;fill:#2c2c2a}
    .sm{font-size:11px;fill:#5f5e5a}
    .xs{font-size:10px;fill:#888780}
    .strong{font-weight:600}
    .chip{font-size:9px;font-weight:700;letter-spacing:.4px}
    .nm{font-size:12px;font-weight:600;fill:#2c2c2a}
    .pv{font-size:11px;fill:#5f5e5a}
    .cap{font-size:11px;fill:#888780}
    .badge{font-size:10px;fill:#888780}
  </style>

  <rect width="1600" height="900" class="canvas"/>

  <!-- Title -->
  <text x="40" y="56" class="ttl">Direction B · Inbox desktop</text>
  <text x="40" y="84" class="sub">Surface 2/5 · 4-pane: rail · lenses + teams · list · detail with Reply/Note tabs</text>

  <!-- Mockup frame (1520 wide, 720 tall) -->
  <rect x="40" y="118" width="1520" height="720" rx="14" class="raised"/>
  <clipPath id="frameClip"><rect x="40" y="118" width="1520" height="720" rx="14"/></clipPath>
  <g clip-path="url(#frameClip)">

    <!-- Global rail (60 wide) -->
    <rect x="40" y="118" width="60" height="720" class="rail"/>
    <rect x="56" y="138" width="28" height="28" rx="6" fill="#3d74e6"/>
    <text x="70" y="158" class="chip" fill="#fff" text-anchor="middle">G</text>
    <!-- rail icons (text glyphs) -->
    <rect x="52" y="186" width="36" height="36" rx="8" fill="rgba(61,116,230,0.22)"/>
    <text x="70" y="210" class="rail-active" font-size="16" text-anchor="middle">📥</text>
    <text x="70" y="252" class="rail-icon" font-size="16" text-anchor="middle">⌂</text>
    <text x="70" y="294" class="rail-icon" font-size="16" text-anchor="middle">👥</text>
    <text x="70" y="336" class="rail-icon" font-size="16" text-anchor="middle">📢</text>
    <text x="70" y="378" class="rail-icon" font-size="16" text-anchor="middle">🔀</text>
    <text x="70" y="420" class="rail-icon" font-size="16" text-anchor="middle">📊</text>

    <!-- Sidebar (240 wide) -->
    <rect x="100" y="118" width="240" height="720" class="canvas"/>
    <line x1="340" y1="118" x2="340" y2="838" class="border"/>
    <text x="120" y="148" class="h4">MY INBOX</text>
    <g transform="translate(120,160)">
      <rect x="0" y="0" width="200" height="24" rx="4" fill="transparent"/>
      <text x="8" y="16" class="lab">Assigned to me</text>
      <text x="192" y="16" class="badge" text-anchor="end">7</text>
    </g>
    <g transform="translate(120,184)">
      <text x="8" y="16" class="lab">Collaborating</text>
      <text x="192" y="16" class="badge" text-anchor="end">3</text>
    </g>
    <g transform="translate(120,208)">
      <text x="8" y="16" class="lab">Mentions</text>
      <text x="192" y="16" class="badge" text-anchor="end">2</text>
    </g>
    <g transform="translate(120,232)">
      <text x="8" y="16" class="lab">Starred</text>
      <text x="192" y="16" class="badge" text-anchor="end">12</text>
    </g>
    <g transform="translate(120,256)">
      <text x="8" y="16" class="lab">Scheduled</text>
      <text x="192" y="16" class="badge" text-anchor="end">4</text>
    </g>
    <text x="120" y="298" class="h4">COMPANY INBOX</text>
    <g transform="translate(120,310)">
      <rect x="0" y="0" width="200" height="24" rx="4" class="primary-bg"/>
      <text x="8" y="16" class="lab primary strong">★ All</text>
      <text x="192" y="16" class="badge primary" text-anchor="end">1350</text>
    </g>
    <g transform="translate(120,334)">
      <text x="8" y="16" class="lab">Writers</text>
      <text x="192" y="16" class="badge" text-anchor="end">42</text>
    </g>
    <g transform="translate(120,358)">
      <text x="8" y="16" class="lab">Radio</text>
      <text x="192" y="16" class="badge" text-anchor="end">18</text>
    </g>
    <g transform="translate(120,382)">
      <text x="8" y="16" class="lab">Social</text>
      <text x="192" y="16" class="badge" text-anchor="end">9</text>
    </g>
    <g transform="translate(120,406)">
      <text x="8" y="16" class="lab">IT</text>
      <text x="192" y="16" class="badge" text-anchor="end">5</text>
    </g>
    <line x1="128" y1="436" x2="332" y2="436" class="border"/>
    <text x="120" y="456" class="h4">REGIONS</text>
    <g transform="translate(120,468)">
      <text x="8" y="16" class="lab">Hendon</text>
      <text x="192" y="16" class="badge" text-anchor="end">21</text>
    </g>
    <g transform="translate(120,492)">
      <text x="8" y="16" class="lab">Edgware</text>
      <text x="192" y="16" class="badge" text-anchor="end">7</text>
    </g>
    <line x1="128" y1="522" x2="332" y2="522" class="border"/>
    <text x="120" y="542" class="h4">NETWORKS</text>
    <g transform="translate(120,554)">
      <text x="8" y="16" class="lab">CUFI</text>
      <text x="192" y="16" class="badge" text-anchor="end">103</text>
    </g>

    <!-- Conversation list (350 wide) -->
    <rect x="340" y="118" width="350" height="720" class="raised"/>
    <line x1="690" y1="118" x2="690" y2="838" class="border"/>
    <!-- list header -->
    <rect x="340" y="118" width="350" height="48" class="raised"/>
    <line x1="340" y1="166" x2="690" y2="166" class="border"/>
    <rect x="354" y="132" width="106" height="20" rx="4" class="sunken"/>
    <text x="362" y="146" class="lab strong">Open (1350) ▾</text>
    <text x="478" y="148" class="sm">🔍</text>
    <text x="498" y="148" class="sm">↕</text>
    <text x="518" y="148" class="sm">⌧</text>
    <!-- group label -->
    <rect x="340" y="166" width="350" height="22" class="sunken"/>
    <text x="354" y="180" class="h4">▸ UNASSIGNED (1)</text>
    <!-- conv 1 (active) -->
    <rect x="340" y="188" width="350" height="74" class="primary-bg"/>
    <rect x="340" y="188" width="3" height="74" class="primary"/>
    <circle cx="362" cy="210" r="14" class="primary-bg" stroke="#1851cc"/>
    <text x="362" y="214" class="chip primary" text-anchor="middle">JC</text>
    <text x="384" y="208" class="nm">Janice Chan</text>
    <text x="676" y="208" class="xs" text-anchor="end">16:36</text>
    <text x="384" y="226" class="pv">📞 Great! Thanks so much! Looking…</text>
    <rect x="384" y="236" width="44" height="14" rx="7" class="sunken"/>
    <text x="406" y="246" class="chip text-2" text-anchor="middle">INBOUND</text>
    <rect x="432" y="236" width="32" height="14" rx="7" class="sunken"/>
    <text x="448" y="246" class="chip text-2" text-anchor="middle">RENT</text>
    <rect x="468" y="236" width="22" height="14" rx="7" class="sunken"/>
    <text x="479" y="246" class="chip text-2" text-anchor="middle">+2</text>
    <text x="676" y="246" class="success strong" font-size="12" text-anchor="end">✓✓</text>
    <!-- group label -->
    <rect x="340" y="262" width="350" height="22" class="sunken"/>
    <text x="354" y="276" class="h4">─ ASSIGNED (100) ─</text>
    <!-- conv 2 -->
    <rect x="340" y="284" width="350" height="60" class="raised"/>
    <line x1="340" y1="344" x2="690" y2="344" class="border"/>
    <circle cx="362" cy="306" r="14" class="primary-bg"/>
    <text x="362" y="310" class="chip primary" text-anchor="middle">KC</text>
    <text x="384" y="304" class="nm">Ken Chan</text>
    <text x="676" y="304" class="xs" text-anchor="end">16:36</text>
    <text x="384" y="322" class="pv">▶ Video</text>
    <rect x="384" y="328" width="44" height="14" rx="7" class="sunken"/>
    <text x="406" y="338" class="chip text-2" text-anchor="middle">INBOUND</text>
    <rect x="432" y="328" width="32" height="14" rx="7" class="sunken"/>
    <text x="448" y="338" class="chip text-2" text-anchor="middle">RENT</text>
    <text x="676" y="338" class="success strong" font-size="12" text-anchor="end">✓✓</text>
    <!-- conv 3 -->
    <rect x="340" y="344" width="350" height="60" class="raised"/>
    <line x1="340" y1="404" x2="690" y2="404" class="border"/>
    <circle cx="362" cy="366" r="14" class="primary-bg"/>
    <text x="362" y="370" class="chip primary" text-anchor="middle">SC</text>
    <text x="384" y="364" class="nm">Shaira Cheung</text>
    <text x="676" y="364" class="xs" text-anchor="end">16:36</text>
    <text x="384" y="382" class="pv">🖼 Image</text>
    <rect x="384" y="388" width="44" height="14" rx="7" class="sunken"/>
    <text x="406" y="398" class="chip text-2" text-anchor="middle">INBOUND</text>
    <rect x="432" y="388" width="32" height="14" rx="7" class="sunken"/>
    <text x="448" y="398" class="chip text-2" text-anchor="middle">RENT</text>
    <rect x="468" y="388" width="38" height="14" rx="7" class="sunken"/>
    <text x="487" y="398" class="chip text-2" text-anchor="middle">FEMALE</text>
    <text x="676" y="398" class="success strong" font-size="12" text-anchor="end">✓✓</text>
    <!-- conv 4 -->
    <rect x="340" y="404" width="350" height="60" class="raised"/>
    <circle cx="362" cy="426" r="14" class="primary-bg"/>
    <text x="362" y="430" class="chip primary" text-anchor="middle">KC</text>
    <text x="384" y="424" class="nm">Katherine C.</text>
    <text x="676" y="424" class="xs" text-anchor="end">16:36</text>
    <text x="384" y="442" class="pv">Can I book an appointment online…</text>
    <rect x="384" y="448" width="44" height="14" rx="7" class="sunken"/>
    <text x="406" y="458" class="chip text-2" text-anchor="middle">INBOUND</text>
    <text x="676" y="458" class="success strong" font-size="12" text-anchor="end">✓✓</text>

    <!-- Detail pane (870 wide) -->
    <rect x="690" y="118" width="870" height="720" class="canvas"/>
    <!-- detail header -->
    <rect x="690" y="118" width="870" height="48" class="raised"/>
    <line x1="690" y1="166" x2="1560" y2="166" class="border"/>
    <text x="710" y="148" class="lab strong" font-size="14">Janice Chan</text>
    <text x="800" y="148" class="warning" font-size="14">★</text>
    <text x="1530" y="148" class="text-2" text-anchor="end">⊕   ⓘ   ⋯</text>
    <!-- assignment bar -->
    <rect x="690" y="166" width="870" height="34" class="canvas"/>
    <line x1="690" y1="200" x2="1560" y2="200" class="border"/>
    <text x="710" y="186" class="sm">Assigned:</text>
    <rect x="765" y="174" width="118" height="20" rx="4" class="raised"/>
    <text x="775" y="188" class="sm">Unassigned ▾</text>

    <!-- thread -->
    <!-- msg 1: customer -->
    <circle cx="720" cy="240" r="14" class="primary-bg"/>
    <text x="720" y="244" class="chip primary" text-anchor="middle">JC</text>
    <rect x="745" y="218" width="500" height="58" rx="8" class="raised"/>
    <text x="757" y="236" class="xs strong">Janice Chan · 16:36</text>
    <text x="757" y="256" class="lab">Hi, hoping you can help with the Hendon flyer for</text>
    <text x="757" y="270" class="lab">Pesach. We need eyes on it before Sunday.</text>
    <!-- msg 2: internal note (yellow) -->
    <circle cx="720" cy="316" r="14" class="warning-bg"/>
    <text x="720" y="320" class="chip warning" text-anchor="middle">SH</text>
    <rect x="745" y="294" width="500" height="58" rx="8" class="warning-bg" stroke="#ba7517" stroke-width="1"/>
    <rect x="745" y="294" width="3" height="58" class="warning"/>
    <text x="757" y="312" class="xs warning strong">Sharon · internal note · 16:42</text>
    <text x="757" y="332" class="lab">Looping in @Dave for typesetting. Should be back to</text>
    <text x="757" y="346" class="lab">her by EOD.</text>
    <!-- msg 3: system -->
    <circle cx="720" cy="392" r="14" class="info-bg"/>
    <text x="720" y="396" class="chip info" text-anchor="middle">⚙</text>
    <rect x="745" y="378" width="300" height="42" rx="8" class="info-bg" stroke="#3c3489" stroke-width="0.5"/>
    <rect x="745" y="378" width="3" height="42" class="info"/>
    <text x="757" y="394" class="xs info strong">System · automated</text>
    <text x="757" y="412" class="sm info">Snooze ends in 2h.</text>

    <!-- composer -->
    <line x1="690" y1="700" x2="1560" y2="700" class="border"/>
    <rect x="690" y="700" width="870" height="138" class="raised"/>
    <!-- tabs -->
    <rect x="710" y="714" width="58" height="26" rx="4" class="raised" stroke="#e5e2d8"/>
    <text x="720" y="732" class="lab strong">Reply</text>
    <rect x="772" y="714" width="98" height="26" rx="4" fill="transparent"/>
    <text x="782" y="732" class="lab text-2">Internal note</text>
    <!-- input -->
    <rect x="710" y="744" width="830" height="50" rx="8" class="raised" stroke="#e5e2d8"/>
    <text x="724" y="772" class="sm text-3">Type a reply…</text>
    <!-- foot -->
    <text x="724" y="822" class="sm">📎  😀  🔗  🎤</text>
    <rect x="1356" y="808" width="98" height="22" rx="4" class="sunken"/>
    <text x="1366" y="822" class="sm">via WhatsApp ▾</text>
    <rect x="1462" y="804" width="78" height="30" rx="15" class="primary"/>
    <text x="1501" y="824" class="lab" fill="#fff" text-anchor="middle" font-weight="700">Send</text>

  </g>

  <!-- Caption -->
  <text x="40" y="876" class="cap">GPS Action · Coordination board · Pre-prototype mockup · v0.3 · 2026-05-03</text>
</svg>
