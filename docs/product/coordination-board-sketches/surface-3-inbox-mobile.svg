<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="-apple-system, BlinkMacSystemFont, Inter, 'Helvetica Neue', Arial, sans-serif">
  <title>Direction B · Inbox mobile · GPS Action coordination board</title>
  <desc>Surface 3 of 5 · Two phone frames showing list view + detail view; bottom-tab Mine/Team/Mentions replaces the desktop sidebar. Pre-prototype mockup, GPS palette.</desc>
  <style>
    .canvas{fill:#f4f1ea}.raised{fill:#fff;stroke:#e5e2d8;stroke-width:1}
    .sunken{fill:#ede9df}.border{stroke:#e5e2d8;stroke-width:1;fill:none}
    .frame{fill:#1a1d29}
    .urgent{fill:#d85a30}.urgent-bg{fill:#faece7}
    .info{fill:#3c3489}.info-bg{fill:#eeedfe}
    .success{fill:#0f6e56}.success-bg{fill:#e1f5ee}
    .warning{fill:#ba7517}.warning-bg{fill:#faeeda}
    .primary{fill:#1851cc}.primary-bg{fill:#e6edfa}
    .text{fill:#2c2c2a}.text-2{fill:#5f5e5a}.text-3{fill:#888780}
    .ttl{font-size:30px;font-weight:700;fill:#2c2c2a;letter-spacing:-0.5px}
    .sub{font-size:15px;fill:#5f5e5a}
    .h4{font-size:10px;font-weight:600;fill:#888780;letter-spacing:1px}
    .lab{font-size:13px;fill:#2c2c2a}
    .sm{font-size:11px;fill:#5f5e5a}
    .xs{font-size:10px;fill:#888780}
    .strong{font-weight:600}
    .chip{font-size:9px;font-weight:700;letter-spacing:.4px}
    .nm{font-size:13px;font-weight:600;fill:#2c2c2a}
    .pv{font-size:12px;fill:#5f5e5a}
    .cap{font-size:11px;fill:#888780}
    .badge{font-size:10px;fill:#888780}
    .phone-label{font-size:13px;fill:#5f5e5a;font-style:italic}
  </style>

  <rect width="1600" height="900" class="canvas"/>

  <!-- Title -->
  <text x="40" y="56" class="ttl">Direction B · Inbox mobile</text>
  <text x="40" y="84" class="sub">Surface 3/5 · Push/pop nav · bottom-tab replaces sidebar lenses (Mine/Team/Mentions)</text>

  <!-- Phone 1: List view (centered left) -->
  <g transform="translate(400,140)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="360" height="660" rx="32" class="frame"/>
    <rect x="8" y="8" width="344" height="644" rx="24" class="canvas"/>
    <!-- status bar -->
    <rect x="8" y="8" width="344" height="32" rx="24" class="frame"/>
    <rect x="8" y="32" width="344" height="8" class="frame"/>
    <text x="28" y="28" class="xs" fill="#cfd2dc">10:59</text>
    <text x="332" y="28" class="xs" fill="#cfd2dc" text-anchor="end">📶 🔋</text>
    <!-- header -->
    <rect x="8" y="40" width="344" height="44" class="raised"/>
    <line x1="8" y1="84" x2="352" y2="84" class="border"/>
    <text x="22" y="68" class="lab strong">☰  Writers ▾</text>
    <text x="338" y="68" class="text-2" font-size="14" text-anchor="end">ⓘ  ⋯</text>
    <!-- filter strip -->
    <rect x="8" y="84" width="344" height="44" class="canvas"/>
    <line x1="8" y1="128" x2="352" y2="128" class="border"/>
    <rect x="22" y="98" width="98" height="20" rx="4" class="sunken"/>
    <text x="30" y="112" class="lab strong">Open (42) ▾</text>
    <text x="138" y="114" class="sm">🔍</text>
    <text x="158" y="114" class="sm">↕</text>

    <!-- group label -->
    <rect x="8" y="128" width="344" height="22" class="sunken"/>
    <text x="22" y="142" class="h4">▸ UNASSIGNED (1)</text>
    <!-- conv 1 -->
    <rect x="8" y="150" width="344" height="80" class="raised"/>
    <line x1="8" y1="230" x2="352" y2="230" class="border"/>
    <circle cx="32" cy="172" r="14" class="primary-bg"/>
    <text x="32" y="176" class="chip primary" text-anchor="middle">JC</text>
    <text x="56" y="170" class="nm">Janice Chan</text>
    <text x="338" y="170" class="xs" text-anchor="end">16:36</text>
    <text x="56" y="190" class="pv">📞 Hi, hoping you can help…</text>
    <rect x="56" y="200" width="48" height="16" rx="8" class="sunken"/>
    <text x="80" y="211" class="chip text-2" text-anchor="middle">INBOUND</text>
    <rect x="108" y="200" width="34" height="16" rx="8" class="sunken"/>
    <text x="125" y="211" class="chip text-2" text-anchor="middle">RENT</text>
    <rect x="146" y="200" width="22" height="16" rx="8" class="sunken"/>
    <text x="157" y="211" class="chip text-2" text-anchor="middle">+2</text>
    <text x="338" y="211" class="success strong" font-size="13" text-anchor="end">✓✓</text>
    <!-- group label -->
    <rect x="8" y="230" width="344" height="22" class="sunken"/>
    <text x="22" y="244" class="h4">─ ASSIGNED (100) ─</text>
    <!-- conv 2 -->
    <rect x="8" y="252" width="344" height="80" class="raised"/>
    <line x1="8" y1="332" x2="352" y2="332" class="border"/>
    <circle cx="32" cy="274" r="14" class="primary-bg"/>
    <text x="32" y="278" class="chip primary" text-anchor="middle">KC</text>
    <text x="56" y="272" class="nm">Ken Chan</text>
    <text x="338" y="272" class="xs" text-anchor="end">16:36</text>
    <text x="56" y="292" class="pv">▶ Video</text>
    <rect x="56" y="302" width="48" height="16" rx="8" class="sunken"/>
    <text x="80" y="313" class="chip text-2" text-anchor="middle">INBOUND</text>
    <rect x="108" y="302" width="34" height="16" rx="8" class="sunken"/>
    <text x="125" y="313" class="chip text-2" text-anchor="middle">RENT</text>
    <text x="338" y="313" class="success strong" font-size="13" text-anchor="end">✓✓</text>
    <!-- conv 3 -->
    <rect x="8" y="332" width="344" height="80" class="raised"/>
    <line x1="8" y1="412" x2="352" y2="412" class="border"/>
    <circle cx="32" cy="354" r="14" class="primary-bg"/>
    <text x="32" y="358" class="chip primary" text-anchor="middle">SC</text>
    <text x="56" y="352" class="nm">Shaira Cheung</text>
    <text x="338" y="352" class="xs" text-anchor="end">16:36</text>
    <text x="56" y="372" class="pv">🖼 Image</text>
    <rect x="56" y="382" width="48" height="16" rx="8" class="sunken"/>
    <text x="80" y="393" class="chip text-2" text-anchor="middle">INBOUND</text>
    <rect x="108" y="382" width="34" height="16" rx="8" class="sunken"/>
    <text x="125" y="393" class="chip text-2" text-anchor="middle">RENT</text>
    <rect x="146" y="382" width="40" height="16" rx="8" class="sunken"/>
    <text x="166" y="393" class="chip text-2" text-anchor="middle">FEMALE</text>
    <text x="338" y="393" class="success strong" font-size="13" text-anchor="end">✓✓</text>

    <!-- bottom tabs -->
    <rect x="8" y="588" width="344" height="64" class="raised"/>
    <line x1="8" y1="588" x2="352" y2="588" class="border"/>
    <rect x="8" y="586" width="115" height="3" class="primary"/>
    <text x="65" y="618" class="lab primary strong" text-anchor="middle">Mine</text>
    <text x="180" y="618" class="lab text-3" text-anchor="middle">Team</text>
    <text x="295" y="618" class="lab text-3" text-anchor="middle">Mentions</text>
  </g>
  <text x="580" y="828" class="phone-label" text-anchor="middle">List view · tap row to push detail</text>

  <!-- Phone 2: Detail view -->
  <g transform="translate(840,140)">
    <rect x="0" y="0" width="360" height="660" rx="32" class="frame"/>
    <rect x="8" y="8" width="344" height="644" rx="24" class="canvas"/>
    <rect x="8" y="8" width="344" height="32" rx="24" class="frame"/>
    <rect x="8" y="32" width="344" height="8" class="frame"/>
    <text x="28" y="28" class="xs" fill="#cfd2dc">10:59</text>
    <text x="332" y="28" class="xs" fill="#cfd2dc" text-anchor="end">📶 🔋</text>
    <!-- header -->
    <rect x="8" y="40" width="344" height="44" class="raised"/>
    <line x1="8" y1="84" x2="352" y2="84" class="border"/>
    <text x="22" y="68" class="lab strong">◀  Janice Chan</text>
    <text x="148" y="68" class="warning" font-size="13">★</text>
    <text x="338" y="68" class="text-2" font-size="14" text-anchor="end">⋯</text>
    <!-- meta strip -->
    <rect x="8" y="84" width="344" height="36" class="canvas"/>
    <line x1="8" y1="120" x2="352" y2="120" class="border"/>
    <text x="22" y="106" class="sm">Unassigned</text>
    <rect x="100" y="94" width="48" height="16" rx="8" class="sunken"/>
    <text x="124" y="105" class="chip text-2" text-anchor="middle">INBOUND</text>
    <rect x="152" y="94" width="34" height="16" rx="8" class="sunken"/>
    <text x="169" y="105" class="chip text-2" text-anchor="middle">RENT</text>

    <!-- thread -->
    <!-- msg 1 -->
    <circle cx="32" cy="148" r="13" class="primary-bg"/>
    <text x="32" y="152" class="chip primary" text-anchor="middle">JC</text>
    <rect x="50" y="130" width="280" height="56" rx="8" class="raised"/>
    <text x="60" y="146" class="xs strong">Janice Chan · 16:36</text>
    <text x="60" y="164" class="sm">Hi, hoping you can help with the</text>
    <text x="60" y="178" class="sm">Hendon flyer for Pesach.</text>
    <!-- msg 2: note -->
    <circle cx="32" cy="216" r="13" class="warning-bg"/>
    <text x="32" y="220" class="chip warning" text-anchor="middle">SH</text>
    <rect x="50" y="198" width="280" height="56" rx="8" class="warning-bg" stroke="#ba7517" stroke-width="1"/>
    <rect x="50" y="198" width="3" height="56" class="warning"/>
    <text x="60" y="214" class="xs warning strong">Sharon · internal note</text>
    <text x="60" y="232" class="sm">Looping in @Dave for typesetting.</text>
    <!-- msg 3: system -->
    <circle cx="32" cy="284" r="13" class="info-bg"/>
    <text x="32" y="288" class="chip info" text-anchor="middle">⚙</text>
    <rect x="50" y="266" width="240" height="40" rx="8" class="info-bg" stroke="#3c3489" stroke-width="0.5"/>
    <rect x="50" y="266" width="3" height="40" class="info"/>
    <text x="60" y="282" class="xs info strong">System</text>
    <text x="60" y="298" class="sm info">Snooze ends in 2h.</text>

    <!-- composer -->
    <line x1="8" y1="500" x2="352" y2="500" class="border"/>
    <rect x="8" y="500" width="344" height="152" class="raised"/>
    <!-- tabs -->
    <rect x="22" y="514" width="60" height="24" rx="4" class="raised" stroke="#e5e2d8"/>
    <text x="32" y="530" class="lab strong">Reply</text>
    <text x="92" y="530" class="lab text-2">Note</text>
    <!-- input -->
    <rect x="22" y="546" width="316" height="48" rx="8" class="raised" stroke="#e5e2d8"/>
    <text x="34" y="572" class="sm text-3">Type a reply…</text>
    <!-- foot -->
    <text x="32" y="618" class="sm">📎  😀</text>
    <rect x="216" y="606" width="48" height="22" rx="4" class="sunken"/>
    <text x="240" y="620" class="sm" text-anchor="middle">WA ▾</text>
    <rect x="272" y="602" width="66" height="30" rx="15" class="primary"/>
    <text x="305" y="622" class="lab" fill="#fff" text-anchor="middle" font-weight="700">Send</text>
  </g>
  <text x="1020" y="828" class="phone-label" text-anchor="middle">Detail view · swipe-back to list</text>

  <!-- Caption -->
  <text x="40" y="876" class="cap">GPS Action · Coordination board · Pre-prototype mockup · v0.3 · 2026-05-03</text>
</svg>
